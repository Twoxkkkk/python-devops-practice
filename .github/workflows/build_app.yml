name: "Build & Push Docker Image"

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: "${{secrets.DOCKER_USERNAME}}/${{github.event.repository.name}}:${{github.sha}}"

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read  
    strategy:
      matrix: 
        linter: [flake8, pylint, ruff, mypy, pytype, pyright, fixit, pyre]

    steps:
      - uses: advanced-security/python-lint-code-scanning-action@v1

        with:
          target: app/
          linter: ${{matrix.linter}}

  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
    
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
    
      - name: Login To DockerHub
        uses: docker/login-action@v3
        with: 
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_ACCESS_TOKEN}}

      - name: Build Docker Image
        run:
          docker build --tag ${{env.IMAGE_NAME}} app/
      
      - name: Push Image to Docker Hub
        run: 
          docker push ${{env.IMAGE_NAME}}
    
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Update values.yaml with new image
        run: |
          echo "Updating imageName to: ${{env.IMAGE_NAME}}"

          FILE_PATH="./k8s/values.yaml"

          ls

          echo "Navigating to a working directory.."
          cd $GITHUB_WORKSPACE

          ls

          #sed -i "s#^imageName:.*#imageName: ${IMAGE_NAME}#" "$FILE_PATH"
          #cat values.yaml
        env:
          IMAGE_NAME: "${{env.IMAGE_NAME}}"

      - name: Commit & Push to trigger ArgoCD
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./k8s
          git commit -m "chore: update image tag to ${{ github.sha }}"
          git push origin HEAD:${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
