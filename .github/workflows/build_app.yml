name: "Build & Push Docker Image"

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: "${{secrets.DOCKER_USERNAME}}/${{github.event.repository.name}}:${{github.sha}}"

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read  
    strategy:
      matrix: 
        linter: [flake8, pylint, ruff, mypy, pytype, pyright, fixit, pyre]

    steps:
      - uses: advanced-security/python-lint-code-scanning-action@v1

        with:
          target: app/
          linter: ${{matrix.linter}}

  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
    
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
    
      - name: Login To DockerHub
        uses: docker/login-action@v3
        with: 
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_ACCESS_TOKEN}}

      - name: Build Docker Image
        run:
          docker build --tag ${{env.IMAGE_NAME}} app/
      
      - name: Push Image to Docker Hub
        run: 
          docker push ${{env.IMAGE_NAME}}
    
  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    permissions:
      contents: write

    steps:
      - name: Install yq
        run: |
          curl -sL https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -o yq
          chmod +x yq && sudo mv yq /usr/local/bin/

      - name: Update values.yaml
        run: |
          yq -i ".imageName = \"\${{env.IMAGE_NAME}}\"" k8s/values.yaml

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          persist-credentials: true
          branch: ${{github.ref_name}}
